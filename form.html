<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Pendaftaran - Tech Community</title>
  <link rel="icon" href="foto/logo/edited-photo.png" type="image/png"/>
  <link rel="stylesheet" href="CSS/style-form.css"/>
</head>
<body data-page="form">

<!-- ── HEADER ── -->
<header>
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <img src="foto/logo/edited-photo.png" alt="logo"/>
      <span>TechCommunity</span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="form.html">Form</a>
      <a href="gallery.html">Multimedia</a>
    </nav>
    <div class="header-right">
      <button id="darkToggle" style="width:52px;height:28px;background:#555;border-radius:50px;padding:4px;display:inline-flex;align-items:center;border:none;cursor:pointer;flex-shrink:0;box-sizing:border-box;transition:background 0.3s;outline:none;">
        <div id="darkToggleThumb" style="width:20px;height:20px;background:#ccc;border-radius:50%;flex-shrink:0;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,0.5);transition:transform 0.3s ease,background 0.3s;transform:translateX(0);"></div>
      </button>
      <button class="hamburger" id="mobileMenuBtn" aria-label="Buka menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- ── MOBILE MENU OVERLAY ── -->
<div id="mobileMenu">
  <button id="closeMobileMenu" style="position:absolute;top:24px;right:28px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;line-height:1;">&times;</button>
  <a href="index.html">Home</a>
  <a href="form.html">Form</a>
  <a href="gallery.html">Multimedia</a>
</div>

<!-- Back -->
<a href="index.html" class="back-btn">← Back Home</a>

<!-- ── MAIN ── -->
<main>
  <div class="form-layout">

    <!-- Kiri: judul -->
    <div class="form-left">
      <h1>Form<br/>Pendaftaran<br/>Anggota</h1>
      <p>Isi form untuk bergabung dengan Tech Community</p>
    </div>

    <!-- Kanan: card macOS -->
    <div class="form-right">
      <div class="form-card">

        <!-- macOS dots -->
        <div class="window-dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>

        <form id="member-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="nama">Nama Lengkap :</label>
            <input class="form-input" type="text" id="nama" name="nama" autocomplete="name"/>
          </div>
          <span class="field-error-message" id="nama-error"></span>

          <div class="form-group">
            <label class="form-label" for="email">Email :</label>
            <input class="form-input" type="email" id="email" name="email" autocomplete="email"/>
          </div>
          <span class="field-error-message" id="email-error"></span>

          <div class="form-group">
            <label class="form-label" for="bidang">Bidang Minat :</label>
            <select class="form-input form-select" id="bidang" name="bidang">
              <option value="">-- Pilih --</option>
              <option value="Web Development">Web Development</option>
              <option value="Data Science">Data Science</option>
              <option value="Machine Learning">Machine Learning</option>
              <option value="Cybersecurity">Cybersecurity</option>
              <option value="DevOps">DevOps</option>
              <option value="Mobile Development">Mobile Development</option>
              <option value="UI/UX Design">UI/UX Design</option>
              <option value="Game Development">Game Development</option>
              <option value="Lainnya">Lainnya</option>
            </select>
          </div>
          <span class="field-error-message" id="bidang-error"></span>

          <div class="form-spacer"></div>

          <div class="form-actions">
            <button type="submit" class="btn-daftar">Daftar</button>
            <button type="reset"  class="btn-reset">Reset Form</button>
          </div>

        </form>
      </div>
    </div>

  </div>
</main>

<footer>
  <p>© 2026 Tech Community · Dibangun dengan HTML, CSS &amp; JavaScript</p>
</footer>

<script src="Javascript/app.js"></script>
</body>
</html>
