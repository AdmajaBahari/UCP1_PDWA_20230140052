<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Community</title>
    <link rel="icon" href="foto/logo/edited-photo.png" type="image/png" />
    <link rel="stylesheet" href="/CSS/style-form.css">
    <style>
        .form-card  { max-width: 560px; margin: 0 auto; }
        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
        .page-header p { color: var(--text-muted); }
        .form-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
        select option { background: var(--surface2); }
    </style>
</head>
<body data-page="form">

    <header>
        <div class="container">
            <div class="nav-inner">
                <img src="foto/logo/edited-photo.png" alt="Tech Community Logo" style="height: 36px; width: auto;">
                <span>Tech</span>Community</div>
                <nav>
                    <a href="./index.html">Home</a>
                    <a href="./form.html">Form</a>
                    <a href="./gallery.html">Multimedia</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="form-card">
                
                <div class="page-header">
                    <a href="./index.html" style="font-size: 0.8rem; color: var(--text-muted);">← Back Home</a>
                    <h1 style="margin-top: 12px;">Form Pendaftaran Anggota</h1>
                    <p>Isi form di bawah untuk bergabung dengan Tech Community</p>
                    </div>

                    <div class="card">
                        <form id="member-form" novalidate>
                            

                            <!-- NAMA -->
                             <div class="form-group">
                                <label for="name">Nama Lengkap <span style="color: var(--danger);">:</span></label>
                                <input type="text" id="name" name="name" placeholder="Contoh: Admaja Bahari" autocomplete="name" />
                                <div class="field-error-message" id="name-error"></div>
                    </div>

                             <!-- EMAIL -->
                            <div class="form-group">
                                <label for="email">Alamat Email <span style="color:var(--danger)">:</span></label>
                                <input type="email" id="email" name="email" placeholder="Contoh: admaja@techcommunity.ac.id" autocomplete="email" />
                                <div class="field-error-message" id="email-error"></div>
                            </div>

                        <!-- BIDANG MINAT -->
                        <div class="form-group">
                            <label for="bidang">Bidang Minat <span style="color:var(--danger)">:</span></label>
                            <select id="bidang" name="bidang">
                                <option value="">-- Pilih Bidang --</option>
                                <option value="Web Development">Web Development</option>
                                <option value="Data Science">Data Science</option>
                                <option value="Machine Learning">Machine Learning</option>
                                <option value="Cybersecurity">Cybersecurity</option>
                                <option value="DevOps">DevOps</option>
                                <option value="Game Development">Game Development</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                            <div class="field-error-message" id="bidang-error"></div>
                        </div>
 
                        <!-- Action -->
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Daftar</button>
                            <button type="reset" class="btn btn-outline">Reset Form</button>
                        </div>
 
                    </form>

                            <!-- Hasil submit tampilkan di sini -->
                            <div id="form-result" class="result-box"></div>

                        </div>

                    </div>
            </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Tech Community · Dibangun dengan HTML, CSS &amp; JavaScript</p>
        </div>
    </footer>

    <script src="/Javascript/script-form.js"></script>
</body>
</html>
